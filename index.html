<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Hop Platformer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell" aria-label="2D platformer game">
    <header class="hud">
      <h1>Pixel Hop</h1>
      <div class="stats" aria-live="polite">
        <span id="score">Score: 0</span>
        <span id="status">Collect all stars ⭐</span>
      </div>
    </header>
    <canvas id="game" width="960" height="540" aria-label="Platformer game canvas"></canvas>
    <p class="controls">Controls: ⬅️ ➡️ move, Space / ⬆️ jump, R restart.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
