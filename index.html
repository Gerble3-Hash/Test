<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator" aria-label="Calculator app">
    <h1>Calculator</h1>
    <input id="display" class="display" type="text" value="0" readonly aria-label="Calculator display" />

    <div class="buttons" role="group" aria-label="Calculator buttons">
      <button data-action="clear" class="action">C</button>
      <button data-action="backspace" class="action">⌫</button>
      <button data-value="/" class="operator">÷</button>
      <button data-value="*" class="operator">×</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button data-value="-" class="operator">−</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button data-value="+" class="operator">+</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button data-action="equals" class="equals" rowspan="2">=</button>

      <button data-value="0" class="zero">0</button>
      <button data-value=".">.</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
